<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
    }
.header{
    background-color: rgb(68, 68, 194);
    color: white;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: space-around;
}
.go-back{
    margin-left: 2vw;
}
.header-space{
    width: 20vw;
}
.bus-deatils{
    display: flex;
    align-items: center;
    width: fit-content;
    justify-content: center;
}
.tracking-area{
    height: 100vh;
    display: flex;
    flex-direction: row;
    width: 100vw;
    /* justify-content: space-evenly; */
    /* align-items:  ; */
}
.bus-path{
    height: 107vh;
    width: 4vw;
    background-color: rgb(119, 199, 226);
    margin-left: 10vw;
    margin-right: 4vw;
}
.bus{
    /* width: 4vw; */
    margin-top: 10vh;
}
.bus-img{
    width: 4vw;
}

.stop-name{
    margin-bottom: 10vh;
    width: 42vw;
}
.space{
    width: 33vw;
}
.stop-timings{
    margin-right: 0px;
    margin-left: 80px;
}
.stop-time{
    margin-bottom: 10vh;
    margin-right: 5vw;
}

.update-info{
   background-color: rgb(208, 232, 253);
   margin-top: 41px;
    padding-top: 0px;
    padding-bottom: 40px;

}

.bar{
    margin-top: 2vw;
}
.bar-img{
    width: 20%;
    margin-left: 40%;
}
.info{
    margin-left: 30vw;
    margin-bottom: 2vh;
}
</style>
<body>
    <div class="header">
        <div class="go-back">
           <img src="left-long-solid.svg" alt="">
        </div>
        <!-- <div class="header-space">

        </div> -->
        <div class="bus-deatils">
            <h2 class="bus-no">401</h2>
            <h2>-</h2>
             <h2 class="bus-name">Athani-Gokak</h2>
            <!-- <date>15-12-2023</date> -->
        </div>
        <div class="dots">
            <img src="ellipsis-vertical-solid.svg" alt="">
        </div>
    </div>
    <div class="tracking-area">
        <div class="bus-path">
        <div class="stop-points">
          
        </div>
        <div class="bus">
            <img src="bus-solid.svg" alt="" class="bus-img">
        </div>
        </div>
        <div class="stop-names">
          <h3 class="stop-name">Sankonatti</h3>
          <h3 class="stop-name">Halyal</h3>
          <h3 class="stop-name">Darur</h3>
          <h3 class="stop-name">Harugeri-cross</h3>
          <h3 class="stop-name">Harugeri</h3>
          <h3 class="stop-name">Raibag</h3>
          <h3 class="stop-name">Mudalagi</h3>
          <h3 class="stop-name">Gokak</h3>

        </div>
        <div class="space">

        </div>
        <div class="stop-timings">
            <h3 class="stop-time"> 1:37</h3>
            <h3 class="stop-time"> 1:45</h3>
            <h3 class="stop-time"> 2:00</h3>
            <h3 class="stop-time"> 2:30</h3>
            <h3 class="stop-time"> 2:40</h3>
            <h3 class="stop-time"> 3:15</h3>
            <h3 class="stop-time"> 3:37</h3>
            <h3 class="stop-time"> 4:00</h3>

        </div>
    </div>
    <div class="update-info">
        <div class="bar">
            <img src="minus-solid.svg" alt="" class="bar-img">
        </div>
        <div class="info">
            <h2>Bus Arrived At Halyal</h2>
        </div>
    </div>
</body>
</html>
