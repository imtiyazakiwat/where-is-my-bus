<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="liveBusStyles.css">
    <title>Live Bus Track</title>
</head>
<body>

<header>
    <div class="bus-info">
        <div class="start-stop">Starting Point/Stop</div>
        <div class="total-km">Total KM</div>
        <div class="destination">Destination Point</div>
    </div>
    <h1>Bus Name</h1>
</header>

<div class="progress-bar">
    <div class="progress">
        <!-- Intermediate stops with round markers -->
        <div class="marker">
            <div class="stop-name">Stop 1</div>
            <div class="arrival-time">10:00 AM</div>
        </div>
        <div class="marker">
            <div class="stop-name">Stop 2</div>
            <div class="arrival-time">11:30 AM</div>
        </div>
        <!-- Add more markers as needed -->
    </div>
</div>

</body>
</html>
